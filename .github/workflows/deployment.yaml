name: Create Infra and Deploy PDFMAN
run-name: Create/Update Infra and Deploying ${{ inputs.revision }} of PDFMAN in ${{ inputs.environment }} environment
on: 
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select the environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - qa
          - prod
      revision:
        description: 'Provide which revision to deploy'
        required: true
jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout project
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.BOT_GITHUB_TOKEN }}
        submodules: true
        ref: ${{ inputs.revision }}
    - name: test code
      run : ls -la